services:
  frontend:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
        NEXT_PUBLIC_API_V1_URL: ${NEXT_PUBLIC_API_V1_URL:-}
        NEXT_PUBLIC_MEDIA_URL: ${NEXT_PUBLIC_MEDIA_URL:-}
        NEXT_PUBLIC_BOT_URL: ${NEXT_PUBLIC_BOT_URL:-}
        NEXT_PUBLIC_SUPPORT_URL: ${NEXT_PUBLIC_SUPPORT_URL:?NEXT_PUBLIC_SUPPORT_URL is required}
        NEXT_PUBLIC_AUTH_TOKEN_MODE: ${NEXT_PUBLIC_AUTH_TOKEN_MODE:-cookie}
        ALLOW_LEGACY_SESSION_AUTH: ${ALLOW_LEGACY_SESSION_AUTH:-}
        NEXT_PUBLIC_PAYME_CHECKOUT_HOSTS: ${NEXT_PUBLIC_PAYME_CHECKOUT_HOSTS:?NEXT_PUBLIC_PAYME_CHECKOUT_HOSTS is required}
        NEXT_PUBLIC_TELEGRAM_ONLY: ${NEXT_PUBLIC_TELEGRAM_ONLY:-false}
        NEXT_PUBLIC_ADMIN_URL: ${NEXT_PUBLIC_ADMIN_URL:-admin}
        NEXT_PUBLIC_YANDEX_MAPS_API_KEY: ${NEXT_PUBLIC_YANDEX_MAPS_API_KEY:-}
    image: ${FRONTEND_IMAGE:-dental-map-frontend:latest}
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 64
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m,uid=101,gid=101
    ports:
      - "${FRONTEND_PORT:-3000}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
